<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blocks Layout</title>
    <link rel="stylesheet" href="./style/style.css">
</head>
<body>

    <!-- Row 1 -->
    <div class="row">
        <div class="box small"></div>
        <div class="box long"></div>
        <div class="box small"></div>
    </div>

    <!-- Row 2 -->
    <div class="row">
        <div class="box wide"></div>
        <div class="column">
            <div class="box tall"></div>
            <div class="box medium"></div>
        </div>
    </div>

    <!-- Row 3 -->
    <div class="row">
        <div class="box tall"></div>
        <div class="box medium"></div>
        <div class="box extra-long"></div>
    </div>

    <!-- Row 4 -->
    <div class="row">
        <div class="box large"></div>
        <div class="box tall"></div>
        <div class="box medium"></div>
        <div class="box tall"></div>
        <div class="box large"></div>
    </div>

</body>
</html>
